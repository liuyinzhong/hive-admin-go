host: localhost:9191
info:
  contact: {}
  description: Hive Admin Go 后端 API 接口文档
  title: Hive Admin API
  version: "1.0"
paths:
  /auth/codes:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的权限码列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 用户未登录
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取用户权限码
      tags:
      - 认证管理
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户通过用户名和密码登录
      parameters:
      - description: 登录请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 用户名或密码错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证管理
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 用户登出系统
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 用户未登录
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 用户登出
      tags:
      - 认证管理
  /auth/menus:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的菜单权限
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 用户未登录
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取用户菜单
      tags:
      - 认证管理
  /auth/profile:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 用户未登录
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取用户信息
      tags:
      - 认证管理
  /dev/bugs:
    delete:
      consumes:
      - application/json
      description: 批量删除缺陷
      parameters:
      - description: 缺陷ID列表
        in: body
        name: request
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 删除缺陷
      tags:
      - 开发管理-缺陷管理
    get:
      consumes:
      - application/json
      description: 分页获取缺陷列表
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页大小
        in: query
        name: pageSize
        type: integer
      - description: 缺陷编号
        in: query
        name: bugNum
        type: integer
      - description: 缺陷标题
        in: query
        name: bugTitle
        type: string
      - description: 项目ID
        in: query
        name: projectId
        type: string
      - description: 版本ID
        in: query
        name: versionId
        type: string
      - description: 模块ID
        in: query
        name: moduleId
        type: string
      - description: 缺陷状态，支持多选：1,2
        in: query
        name: bugStatus
        type: string
      - description: 需求ID
        in: query
        name: storyId
        type: string
      - description: 排序参数
        in: query
        name: sorts
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取缺陷列表
      tags:
      - 开发管理-缺陷管理
    post:
      consumes:
      - application/json
      description: 创建新缺陷
      parameters:
      - description: 缺陷信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateBugRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 创建缺陷
      tags:
      - 开发管理-缺陷管理
  /dev/bugs/{bugId}:
    put:
      consumes:
      - application/json
      description: 更新缺陷信息
      parameters:
      - description: 缺陷ID
        in: path
        name: bugId
        required: true
        type: string
      - description: 缺陷信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBugRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 更新缺陷
      tags:
      - 开发管理-缺陷管理
  /dev/bugs/{bugId}/confirm:
    put:
      consumes:
      - application/json
      description: 确认缺陷并更新缺陷状态
      parameters:
      - description: 缺陷ID
        in: path
        name: bugId
        required: true
        type: string
      - description: 缺陷确认信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ConfirmBugRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 确认成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 确认缺陷
      tags:
      - 开发管理-缺陷管理
  /dev/bugs/{bugId}/field:
    put:
      consumes:
      - application/json
      description: 更新缺陷的单个字段
      parameters:
      - description: 缺陷ID
        in: path
        name: bugId
        required: true
        type: string
      - description: 字段信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBugFieldRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 更新缺陷字段
      tags:
      - 开发管理-缺陷管理
  /dev/bugs/{bugId}/next:
    put:
      consumes:
      - application/json
      description: 更新缺陷状态
      parameters:
      - description: 缺陷ID
        in: path
        name: bugId
        required: true
        type: string
      - description: 缺陷信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBugNextRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 缺陷流转状态
      tags:
      - 开发管理-缺陷管理
  /dev/bugs/{bugNum}:
    get:
      consumes:
      - application/json
      description: 根据缺陷编号获取缺陷详情
      parameters:
      - description: 缺陷编号
        in: path
        name: bugNum
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取缺陷详情
      tags:
      - 开发管理-缺陷管理
  /dev/bugs/all:
    get:
