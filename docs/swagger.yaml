    - name
    - type
    type: object
  models.CreateModuleRequest:
    properties:
      moduleTitle:
        type: string
      projectId:
        type: string
      sort:
        type: integer
    required:
    - moduleTitle
    - projectId
    type: object
  models.CreateNodeItemRequest:
    properties:
      label:
        description: 节点名称
        example: 需求提交
        type: string
      nodeType:
        description: 节点类型 0=开始 1=办理 2=审批 3=结束
        enum:
        - 0
        - 1
        - 2
        - 3
        example: 0
        type: integer
      remark:
        description: 备注
        example: 流程开始节点
        type: string
      sort:
        description: 节点顺序
        example: 1
        type: integer
      userId:
        description: 负责人id
        example: UUID
        type: string
      value:
        description: 节点值
        example: "0"
        type: string
    type: object
  models.CreateNodeRequest:
    properties:
      businessId:
        type: string
      businessType:
        type: string
      label:
        type: string
      nodeType:
        type: integer
      remark:
        type: string
      sort:
        type: integer
      userId:
        type: string
      value:
        type: string
    required:
    - businessId
    - label
    - userId
    - value
    type: object
  models.CreateProjectRequest:
    properties:
      description:
        type: string
      projectLogo:
        type: string
      projectTitle:
        type: string
    required:
    - projectTitle
    type: object
  models.CreateRoleRequest:
    properties:
      permissions:
        items:
          type: string
        type: array
      remark:
        type: string
      roleTitle:
        type: string
      status:
        type: integer
    required:
    - roleTitle
    type: object
  models.CreateStoryRequest:
    properties:
      businessType:
        description: 业务类型,关联dev_node表business_type
        example: "0"
        type: string
      fileIds:
        description: 附件id数组
        example:
        - '["UUID"]'
        items:
          type: string
        type: array
      moduleId:
        description: 关联模块id
        example: UUID
        type: string
      nodes:
        description: 节点信息,新增需求时创建对应节点
        items:
          $ref: '#/definitions/models.CreateNodeItemRequest'
        type: array
      projectId:
        description: 关联项目id
        example: UUID
        type: string
      source:
        description: 需求来源,字典STORY_SOURCE值
        example: "0"
        type: string
      storyLevel:
        description: 需求优先级,字典STORY_LEVEL值
        example: "0"
        type: string
      storyRichText:
        description: 需求描述,富文本格式
        example: 需求描述
        type: string
      storyStatus:
        description: 需求状态,字典STORY_STATUS值
        example: "0"
        type: string
      storyTitle:
        description: 需求标题
        example: 需求标题
        type: string
      storyType:
        description: 需求类型,字典STORY_TYPE值
        example: "0"
        type: string
      userIds:
        description: 参与人员id数组
        example:
        - '["UUID"]'
        items:
          type: string
        type: array
      versionId:
        description: 关联版本id
        example: UUID
        type: string
    required:
    - moduleId
    - projectId
    - storyTitle
    - storyType
    - versionId
    type: object
  models.CreateTaskRequest:
    properties:
      endDate:
        type: string
      moduleId:
        type: string
      planHours:
        type: number
      projectId:
        type: string
      startDate:
        type: string
      storyId:
        type: string
      taskRichText:
        type: string
      taskStatus:
        type: string
      taskTitle:
        type: string
      taskType:
        type: string
      userId:
        type: string
      versionId:
        type: string
    required:
    - endDate
    - planHours
    - projectId
    - startDate
    - taskTitle
    - userId
    type: object
  models.CreateUserRequest:
    properties:
      deptIds:
        items:
          type: string
        type: array
      desc:
        type: string
      password:
        type: string
      realName:
        type: string
      roleIds:
        items:
          type: string
        type: array
      username:
        type: string
    required:
    - password
    - realName
    - username
    type: object
  models.CreateVersionRequest:
    properties:
      endDate:
        type: string
      projectId:
        type: string
      releaseStatus:
        type: string
      remark:
        type: string
      startDate:
        type: string
      version:
        type: string
      versionType:
        type: string
    type: object
  models.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.MenuMeta:
    properties:
      activeIcon:
        type: string
      activePath:
        type: string
      affixTab:
        type: boolean
      affixTabOrder:
        type: integer
      badge:
        type: string
      badgeType:
        type: string
      badgeVariants:
        type: string
      domCached:
        type: boolean
      hideChildrenInMenu:
        type: boolean
      hideInBreadcrumb:
        type: boolean
      hideInMenu:
        type: boolean
      hideInTab:
        type: boolean
      icon:
        type: string
      iframeSrc:
        type: string
      keepAlive:
        type: boolean
      link:
        type: string
      maxNumOfOpenTab:
        type: integer
      menuVisibleWithForbidden:
        type: boolean
      noBasicLayout:
        type: boolean
      openInNewWindow:
        type: boolean
      order:
        type: integer
      query:
        type: string
      title:
        type: string
    type: object
  models.NodeApproveRequest:
