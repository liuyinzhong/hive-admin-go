basePath: /api
definitions:
  models.ConfirmBugRequest:
    properties:
      bugConfirmStatus:
        type: string
      changeRichText:
        type: string
    required:
    - bugConfirmStatus
    type: object
  models.CreateBugRequest:
    properties:
      bugEnv:
        type: string
      bugLevel:
        type: string
      bugRichText:
        type: string
      bugSource:
        type: string
      bugStatus:
        type: string
      bugTitle:
        type: string
      bugType:
        type: string
      bugUa:
        type: string
      moduleId:
        type: string
      projectId:
        type: string
      storyId:
        type: string
      userId:
        type: string
      versionId:
        type: string
    required:
    - bugTitle
    - projectId
    - userId
    type: object
  models.CreateChangeHistoryRequest:
    properties:
      businessId:
        type: string
      businessType:
        type: string
      changeBehavior:
        type: string
      changeRichText:
        type: string
    required:
    - businessId
    - businessType
    - changeBehavior
    type: object
  models.CreateDeptRequest:
    properties:
      deptTitle:
        type: string
      pid:
        type: string
      remark:
        type: string
      status:
        type: integer
    required:
    - deptTitle
    type: object
  models.CreateDictRequest:
    properties:
      color:
        type: string
      label:
        type: string
      pid:
        type: string
      remark:
        type: string
      status:
        type: integer
      type:
        type: string
      value:
        type: string
    required:
    - label
    - type
    type: object
  models.CreateMenuRequest:
    properties:
      authCode:
        type: string
      component:
        type: string
      meta:
        $ref: '#/definitions/models.MenuMeta'
      name:
        type: string
      path:
        type: string
      pid:
        type: string
      status:
        type: integer
      type:
        type: string
    required:
